<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */
            body {
                height: 100vh !important;
            }
            /* #information{
                width: 50vw !important;
            } */
            span {
                padding: 20px 20px;
                margin-top: 50px;
                border: 2px solid black;
                width: 20px;
                height: 30px;
                cursor: pointer;
            }

            .idk {
                display: flex;
                width: 100%;
                justify-content: space-between;
                padding: 0px 50px;
            }
            .sec {
                display: flex;
                flex-direction: column;
            }

            .elements {
                display: flex;
                gap: 2px;
            }
            /* h2, p{
                text-align:center;
            } */
        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
         <div class = "idk">
                <div class="sec metals">
                    <h1>Metals</h1>
                    <div class="elements temp" id="metals">
                    </div>
                </div>
                <div class="sec metalloids">
                    <h1>Metalloids</h1>
                    <div class="elements temp" id="metalloids">
                    </div>
                </div>
                <div classs="sec">
                    <h1>Nonmetals</h1>
                    <div class="elements temp" id="nonmetals">
                    </div>
                </div>
        </div>
            <!-- <span id = "H" data-desc = "H is..." data-atomic-number = 1 data-symbol = "H" data-atomic-name = "Hydrogen">H</span>
            <span id = "He" data-desc = "He is..." data-atomic-number = 2 data-symbol = "He" data-atomic-name = "Helium">He</span> -->
            <!-- <span id = "He" data-desc = "He is..." data-atomic-number = 2 data-symbol = "He" data-atomic-name = "Helium">He</span> -->
         <div id = "information">
            <h2 id = "name"></h2>
            <h2 id = "symbol"></h2>
            <h2 id= "number"></h2>
            <p id = "description"></p>
         </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>
            // JS

            const elements = [{
                name: "Hydrogen",
                atomicNumber: 1,
                symbol: "H",
                description: "H is ..",
                type: "nonmetal"
            },
        {
            name: "Helium",
            atomicNumber: 2,
            symbol: "He",
            description: "He is ...",
            type: "nonmetal"
        },
    {
        name: "Aluminum",
        atomicNumber: 13,
        symbol: "Al",
        description: "Al is ....",
        type: "metalloid"
    },
    {
        name:"Lithium",
        atomicNumber: 3,
        symbol: "Li",
        description: "Li is...",
        type: "metal"
    }]
            var atomicName
            var atomicSymbol;
            var atomicNumber
            var description;
            elements.forEach(function (el) {
                const newSpan = document.createElement("span");
                newSpan.innerHTML = el.symbol;
                newSpan.id = el.atomicNumber;
                newSpan.setAttribute("data-atomic-number", el.atomicNumber);
                newSpan.setAttribute("data-symbol", el.symbol);
                newSpan.setAttribute("data-desc", el.description);
                newSpan.setAttribute("data-atomic-name", el.name);
                const metalloids = document.querySelector("#metalloids");
                const nonmetals = document.querySelector("#nonmetals");
                if (el.type === "metalloid") {
                    metalloids.appendChild(newSpan);
                } else if (el.type === "nonmetal"){
                    nonmetals.appendChild(newSpan);
                }
                else{
                    metals.appendChild(newSpan)
                }
            })
            document.querySelectorAll('span').forEach(function(eachElement){
                eachElement.addEventListener("click", function(event){
                    atomicName = event.target.dataset.atomicName
                    atomicSymbol = event.target.dataset.symbol
                    atomicNumber = event.target.dataset.atomicNumber
                    description = event.target.dataset.desc
                    document.querySelector('#name').innerHTML = "Atomic Name: " + atomicName
                    document.querySelector('#symbol').innerHTML = "Atomic Symbol: " + atomicSymbol
                    document.querySelector('#number').innerHTML = "Atomic Number: " + atomicNumber
                    document.querySelector('#description').innerHTML = description
                })
            })
            // function setup() {
            //     createCanvas(800, 600);
            // }

            // function draw() {

            // }

        </script>
    </body>
</html>
