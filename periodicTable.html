<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <style>
            /* CSS */
            span {
                padding: 20px 20px;
                margin-top: 50px;
                border: 2px solid black;
                width: 100px;
                height: 150px;
                cursor: pointer;
            }

            .idk {
                display: flex;
                width: 100%;
                justify-content: space-between;
                padding: 0px 50px;
            }
            .sec {
                display: flex;
                flex-direction: column;
            }

            .elements {
                margin-top: 30px;
            }

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
         <div class = "idk">
                <div class="sec">
                    <h1>Metals</h1>
                </div>
                <div class="sec">
                    <h1>Liquids</h1>
                </div>
                <div classs="sec">
                    <h1>Nonmetals</h1>
                    <div class="elements">
                        <span id = "H" data-desc = "H is..." data-atomic-number = 1 data-symbol = "H" data-atomic-name = "Hydrogen">H</span>
                        <span id = "He" data-desc = "He is..." data-atomic-number = 2 data-symbol = "He" data-atomic-name = "Helium">He</span>
                    </div>
                </div>
        </div>
            <!-- <span id = "H" data-desc = "H is..." data-atomic-number = 1 data-symbol = "H" data-atomic-name = "Hydrogen">H</span>
            <span id = "He" data-desc = "He is..." data-atomic-number = 2 data-symbol = "He" data-atomic-name = "Helium">He</span> -->
            <!-- <span id = "He" data-desc = "He is..." data-atomic-number = 2 data-symbol = "He" data-atomic-name = "Helium">He</span> -->
         <div id = "information">
            <h2 id = "name"></h2>
            <h2 id = "symbol"></h2>
            <h2 id= "number"></h2>
            <p id = "description"></p>
         </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
        <script>
            // JS
            var atomicName
            var atomicSymbol;
            var atomicNumber
            var description;
            document.querySelectorAll('span').forEach(function(eachElement){
                eachElement.addEventListener("click", function(event){
                    atomicName = event.target.dataset.atomicName
                    atomicSymbol = event.target.dataset.symbol
                    atomicNumber = event.target.dataset.atomicNumber
                    description = event.target.dataset.desc
                    document.querySelector('#name').innerHTML = "Atomic Name: " + atomicName
                    document.querySelector('#symbol').innerHTML = "Atomic Symbol: " + atomicSymbol
                    document.querySelector('#number').innerHTML = "Atomic Number: " + atomicNumber
                    document.querySelector('#description').innerHTML = description
                })
            })
            // function setup() {
            //     createCanvas(800, 600);
            // }

            // function draw() {

            // }

        </script>
    </body>
</html>
